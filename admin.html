<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PCIC Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="wrap">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon"><i class="ti ti-plant"></i></div>
            <div>
                <div class="logo-text">PCIC Admin</div>
                <div class="logo-sub">Philippine Crop Insurance</div>
            </div>
        </div>
        <div class="nav-section">Database Tables</div>
        <button class="nav-item active" onclick="switchTable('cpilabor')" id="nav-cpilabor"><i class="ti ti-briefcase"></i> CPI Labor</button>
        <button class="nav-item" onclick="switchTable('cpimaterial')" id="nav-cpimaterial"><i class="ti ti-package"></i> CPI Material</button>
        <button class="nav-item" onclick="switchTable('cpi')" id="nav-cpi"><i class="ti ti-file-text"></i> CPI</button>
        <button class="nav-item" onclick="switchTable('farm')" id="nav-farm"><i class="ti ti-plant"></i> Farm</button>
        <button class="nav-item" onclick="switchTable('insurance')" id="nav-insurance"><i class="ti ti-shield"></i> Insurance</button>
        <button class="nav-item" onclick="switchTable('proposer')" id="nav-proposer"><i class="ti ti-user"></i> Proposer</button>
        <button class="nav-item" onclick="switchTable('variety')" id="nav-variety"><i class="ti ti-seeding"></i> Variety</button>
    </aside>

    <main class="main">
        <header class="topbar">
            <div>
                <h1 class="modal-ttl" id="ttl">CPI Labor Table</h1>
                <p class="topbar-meta" id="meta">cpilabortable</p>
            </div>
            <div class="topbar-actions">
                <button class="btn btn-primary" onclick="openEdit()"><i class="ti ti-edit"></i>Edit Row</button>
                <button class="btn btn-primary" onclick="openDelete()"><i class="ti ti-trash"></i>Delete Row</button>
            </div>
        </header>

        <div class="content">
            <div class="table-wrap">
                <table>
                    <thead id="thead"></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div id="pgn" style="margin-top: 1rem;"></div>
        </div>
    </main>

    <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 998;">
        <div style="height: 27%; width: 30%; position: absolute; left: 35%; top: 30%; background: #fff; padding: 2%; border-radius: 20px; z-index: 999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box;" class="modal-box">
            <p style="margin-bottom: 2%;" class="modal-ttl">Delete Row</p><hr><br>
            <label>LaborID of row to be deleted</label>
            <input type="text" id="Delete" placeholder="Enter " class="field-input" required style="width: 100%; margin-top: 10px; box-sizing: border-box;" />
            <div class="modal-btn">
                <button class="btn btn-primary" onclick="CloseModal()">Close</button>
                <button class="btn btn-primary" onclick="DeleteSubmit()">Submit</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:3000/api';

    const TABLES = {
        cpilabor: { 
            label: 'CPI Labor Table', 
            meta: 'CPILaborTable', 
            cols: [
            { n: 'LaborID', t: 'INT' },              
            { n: 'CPIID', t: 'INT' },   
            { n: 'LaborWorkforce', t: 'VARCHAR(30)' },
            { n: 'LaborQuantity', t: 'INT' },
            { n: 'LaborCost', t: 'FLOAT' }
            ], 
            rows: [] 
        },
        cpimaterial: { 
            label: 'CPI Material Table', 
            meta: 'cpimaterialtable', 
            cols: [
            { n: 'MaterialID', t: 'INT' },             
            { n: 'CPIID', t: 'INT' },     
            { n: 'MaterialItem', t: 'VARCHAR(30)' },   
            { n: 'MaterialQuantity', t: 'INT' },
            { n: 'MaterialCost', t: 'FLOAT' }
            ], 
            rows: [] 
        },cpi: { 
            label: 'CPI Table', 
            meta: 'cpitable',
            cols: [
            { n: 'CPIID', t: 'INT' },
            { n: 'InsuranceID', t: 'VARCHAR(10)' },
            { n: 'DaysNoAfterPlanting', t: 'INT' }, 
            ], 
            rows: [] 
        },farm: { 
            label: 'Farm Information', 
            meta: 'farmtable', 
            cols: [
            { n: 'PlantationID', t: 'VARCHAR(10)' },   
            { n: 'PlantationName', t: 'VARCHAR(20)' }, 
            { n: 'FarmAddress', t: 'VARCHAR(100)' },   
            { n: 'FarmArea', t: 'FLOAT' },
            { n: 'SoilType', t: 'VARCHAR(20)' },
            { n: 'SoilPH', t: 'FLOAT' },
            { n: 'Topography', t: 'VARCHAR(20)' },
            { n: 'IrrigationType', t: 'VARCHAR(20)' }
            ], 
            rows: [] 
        },
        
        insurance: { 
            label: 'Insurance Policies', 
            meta: 'insurancetable', 
            cols: [
            { n: 'InsuranceID', t: 'VARCHAR(10)' },    
            { n: 'ProposerID', t: 'VARCHAR(10)' },    
            { n: 'Beneficiary', t: 'VARCHAR(30)' },    
            { n: 'Crops', t: 'VARCHAR(20)' },          
            { n: 'PlantationSize', t: 'FLOAT' },       
            { n: 'CoverageStart', t: 'DATE' },         
            { n: 'CoverageEnd', t: 'DATE' },           
            { n: 'Flood', t: 'TINYINT(1)' },          
            { n: 'Typhoon', t: 'TINYINT(1)' },
            { n: 'Drought', t: 'TINYINT(1)' },
            { n: 'Pests', t: 'TINYINT(1)' },
            { n: 'DesiredAmountCover', t: 'FLOAT' },  
            { n: 'PlantationID', t: 'VARCHAR(10)' },   
            { n: 'SupervisingPT', t: 'VARCHAR(30)' },  
            { n: 'PTDate', t: 'DATE' },                
            { n: 'ProposerDate', t: 'DATE' }
            ], 
            rows: [] 
        },
        proposer: { 
            label: 'Proposer Information', 
            meta: 'proposertable',
            cols: [
            { n: 'ProposerID', t: 'VARCHAR(10)' },   
            { n: 'ProposerName', t: 'VARCHAR(30)' },  
            { n: 'Address', t: 'VARCHAR(100)' },     
            { n: 'Birthday', t: 'DATE' },
            { n: 'ContactNo', t: 'VARCHAR(15)' },     
            { n: 'SecondaryContactNo', t: 'VARCHAR(15)' },
            { n: 'CivilStatus', t: 'CHAR(2)' },
            { n: 'Sex', t: 'CHAR(1)' },
            { n: 'IP', t: 'TINYINT(1)' },            
            { n: 'Tribe', t: 'VARCHAR(20)' },
            { n: 'Spouse', t: 'VARCHAR(30)' },
            { n: 'SpouseBirthday', t: 'DATE' }
            ], 
            rows: [] 
        },
        variety: { 
            label: 'Crop Varieties', 
            meta: 'varietytable', 
            cols: [
            { n: 'InsuranceID', t: 'VARCHAR(10)' },  
            { n: 'Variety', t: 'VARCHAR(20)' },       
            { n: 'AreaPlanted', t: 'FLOAT' },
            { n: 'DatePlanting', t: 'DATE' },         
            { n: 'EstHarvestDate', t: 'DATE' },      
            { n: 'AgeGroup', t: 'VARCHAR(20)' },
            { n: 'NumTrees', t: 'INT' },
            { n: 'AvgYield', t: 'FLOAT' }
            ], 
            rows: [] 
        }
    };

    let cur = 'cpilabor', selIdx = null;
    const T = () => TABLES[cur];

    async function fetchTableData() {
        try {
            const response = await fetch('http://localhost:3000/api/tables/' + cur);
            
            if (!response.ok) throw new Error('Table fetch failed');
            
            const data = await response.json();
            T().rows = data; 
            render(); 
        } catch (error) {
            console.error("Connection Error:", error);
            document.getElementById('tbody').innerHTML = 
                `<tr><td colspan="${T().cols.length}" style="color:red; padding:2rem;">
                    Error: ${error.message}. Check browser console (F12).
                </td></tr>`;
        }
    }

    function switchTable(name) {
        cur = name;
        selIdx = null;
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-' + name).classList.add('active');
        
        document.getElementById('ttl').textContent = T().label;
        document.getElementById('meta').textContent = T().meta;
        
        const deleteBtn = document.querySelector('button[onclick="openDelete()"]');
    
        if (name === 'cpi' || name === 'insurance') {
            deleteBtn.disabled = false;
            deleteBtn.style.opacity = '1';
            deleteBtn.style.cursor = 'pointer';
        } else {
            deleteBtn.disabled = true;
            deleteBtn.style.opacity = '0.5';    // Make it look greyed out
            deleteBtn.style.cursor = 'not-allowed'; // Change mouse cursor
        }

        fetchTableData();
    }

    function render() {
        let h = '<tr>';
        T().cols.forEach(c => h += `<th>${c.n}</th>`);
        h += '</tr>';
        document.getElementById('thead').innerHTML = h;
        
        if (T().rows.length === 0) {
            document.getElementById('tbody').innerHTML = 
                `<tr><td colspan="${T().cols.length}">No records found in ${T().meta}.</td></tr>`;
            return;
        }

        let b = '';
        T().rows.forEach((row) => {
            T().cols.forEach(col => {
                let val = row[col.n];
                
                if (col.t === 'DATE' && val) val = val.split('T')[0];
                
                b += `<td>${val !== null && val !== undefined ? val : '—'}</td>`;
            });
            b += '</tr>';
        });
        document.getElementById('tbody').innerHTML = b;
    }

    function openDelete() {
        const modal = document.getElementById('modal-overlay');
        const label = modal.querySelector('label');
        const input = document.getElementById('Delete');
        const title = modal.querySelector('.modal-ttl');

        let idName = "ID";

        // Logic for specific tables
        if (cur === 'cpi') {
            idName = "CPIID";
        } else if (cur === 'insurance') {
            idName = "InsuranceID";
        }

        // Update the UI elements
        title.textContent = `Delete from ${T().label}`;
        label.textContent = `${idName} of row to be deleted`;
        input.placeholder = `Enter ${idName}`;
        input.value = ""; // Clear previous input

        modal.style.display = 'block';
    }

    function CloseModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    async function DeleteSubmit() {
        const idValue = document.getElementById('Delete').value;
        if (!idValue) return alert("Please enter an ID");
        if (!confirm(`Deleting this row will also delete all the corresponding rows in the other tables. Are you sure you want to delete this row?`)) return;

        try {
            if (cur == 'cpi') {
                await fetch(`${API_BASE}/tables/cpilabor/${idValue}`, { method: 'DELETE' });
                await fetch(`${API_BASE}/tables/cpimaterial/${idValue}`, { method: 'DELETE' });
            } 
            else if (cur == 'insurance') {
                const cpiResponse = await fetch(`${API_BASE}/tables/cpi`);
                const allCpiData = await cpiResponse.json();

                const insuranceResponse = await fetch(`${API_BASE}/tables/insurance`);
                const allInsuranceData = await insuranceResponse.json();

                const targetInsurance = allInsuranceData.find(row => row.InsuranceID === idValue);
                
                if (!targetInsurance) return alert("Insurance record not found");

                const relatedCpiIds = allCpiData
                    .filter(row => row.InsuranceID === idValue)
                    .map(row => row.CPIID);

                for (const cpiId of relatedCpiIds) {
                    await fetch(`${API_BASE}/tables/cpilabor/${cpiId}`, { method: 'DELETE' });
                    await fetch(`${API_BASE}/tables/cpimaterial/${cpiId}`, { method: 'DELETE' });
                }

                for (const cpiId of relatedCpiIds) {
                    await fetch(`${API_BASE}/tables/cpi/${cpiId}`, { method: 'DELETE' });
                }
                
                await fetch(`${API_BASE}/tables/variety/${idValue}`, { method: 'DELETE' });
            }

            const response = await fetch(`${API_BASE}/tables/${cur}/${idValue}`, { 
                method: 'DELETE' 
            });

            const result = await response.json();

            if (response.ok) {
                alert(result.message);
                CloseModal();
                fetchTableData();
            } else {
                alert("Error: " + result.message);
            }
        } catch (error) {
            console.error(error);
            alert("Server is not responding.");
        }
    }

    window.onload = fetchTableData;
</script>
</body>
</html>
